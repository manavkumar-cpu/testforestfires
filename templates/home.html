<!-- templates/home.html -->
<!DOCTYPE html>
<html>
<head>
    <title>FWI Prediction</title>
</head>
<body>

    <h2>FWI Prediction Form</h2>

    <form action="/predictdata" method="post">

        <label>Temperature:</label>
        <input type="number" name="Temperature" required><br><br>

        <label>RH:</label>
        <input type="number" name="RH" required><br><br>

        <label>Ws:</label>
        <input type="number" name="Ws" required><br><br>

        <label>Rain:</label>
        <input type="number" step="any" name="Rain" required><br><br>

        <label>FFMC:</label>
        <input type="number" step="any" name="FFMC" required><br><br>

        <label>DMC:</label>
        <input type="number" step="any" name="DMC" required><br><br>

        <label>ISI:</label>
        <input type="number" step="any" name="ISI" required><br><br>

        <label>Classes:</label>
        <input type="number" name="Classes" required><br><br>

        <label>Region:</label>
        <input type="number" name="Region" required><br><br>

        <button type="submit">Predict FWI</button>

    </form>

    <h3>
        {% if results %}
            Predicted FWI: {{ results }}
        {% endif %}
    </h3>

</body>
</html>
